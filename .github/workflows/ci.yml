name: Arynox OS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust:
    name: Rust Daemons
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: cargo build --release 2>&1 || echo "No Rust workspace found"

  flutter:
    name: Flutter Apps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44'
      - run: |
          for dir in src/*/; do
            if [ -f "$dir/pubspec.yaml" ]; then
              echo "Building $(basename $dir)..."
              cd "$dir"
              flutter pub get
              flutter build linux --release || echo "Build failed"
              cd -
            fi
          done

  python:
    name: Python AI Runtime
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          cd ai-python
          pip install wheel setuptools
          pip install -e . || true
          python -c "import arynox_ai; print('AI runtime OK')" || echo "Import failed"

  shellcheck:
    name: Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - run: shellcheck scripts/*.sh build.sh || true
