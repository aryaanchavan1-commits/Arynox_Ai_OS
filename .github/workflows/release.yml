name: Build and Release Arynox OS

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-check:
    name: Build Rust Daemons
    runs-on: ubuntu-24.04
    outputs:
      cache-key: ${{ steps.cache.outputs.cache-primary-key }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true
      - name: Build all Rust daemons
        run: cargo build --release 2>&1
      - name: Upload Rust binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries
          path: target/release/arynox-*
          retention-days: 7

  flutter-check:
    name: Build Flutter Apps
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.6
          channel: stable
      - name: Build all Flutter apps
        run: |
          mkdir -p build/flutter-apps
          for dir in src/*/ src/ai/*/; do
            if [ -f "$dir/pubspec.yaml" ]; then
              app=$(basename "$dir")
              echo "Building $app..."
              cd "$dir"
              flutter pub get
              flutter build linux --release 2>&1 || echo "$app build failed"
              mkdir -p /tmp/flutter-apps/"$app"
              cp -r build/linux/*/release/bundle/* /tmp/flutter-apps/"$app"/ 2>/dev/null || true
              cd -
            fi
          done
      - name: Upload Flutter apps
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apps
          path: /tmp/flutter-apps/
          retention-days: 7

  build-os:
    name: Build OS Image
    runs-on: ubuntu-24.04
    needs: [rust-check, flutter-check]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debootstrap squashfs-tools xorriso \
            grub-pc mtools parted dosfstools \
            curl wget git python3-pip

      - name: Download Rust binaries
        uses: actions/download-artifact@v4
        with:
          name: rust-binaries
          path: target/release/

      - name: Download Flutter apps
        uses: actions/download-artifact@v4
        with:
          name: flutter-apps
          path: build/flutter-apps/

      - name: Build root filesystem
        run: |
          chmod +x target/release/arynox-* 2>/dev/null || true
          sudo bash scripts/build-full-os.sh 2>&1

      - name: Build USB image
        run: sudo bash scripts/build-usb-image.sh 2>&1

      - name: Prepare release artifacts
        run: |
          mkdir -p release
          # Split USB image into <2GB chunks for GitHub Releases
          if [ -f build/arynox-usb.img ]; then
            split -b 1900M build/arynox-usb.img release/arynox-os-${{ github.ref_name }}-amd64.img.part
            # Create checksums
            cd release
            sha256sum arynox-os-${{ github.ref_name }}-amd64.img.part* > SHA256SUMS
            cd ..
          fi
          # Compress squashfs
          if [ -f build/filesystem.squashfs ]; then
            xz -T0 -9 -k build/filesystem.squashfs 2>/dev/null || true
            cp build/filesystem.squashfs.xz release/ 2>/dev/null || cp build/filesystem.squashfs release/
          fi
          # Copy kernel files
          cp build/vmlinuz-* release/ 2>/dev/null || true
          cp build/initramfs.img release/ 2>/dev/null || true
          # Copy Dockerfile and build scripts
          cp Dockerfile release/ 2>/dev/null || true
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Arynox OS ${{ github.ref_name }}
          body: |
            ## Arynox OS ${{ github.ref_name }}

            ### Download & Install

            **Option 1: Pre-built USB image**
            Download all `.part` files, then concatenate:
            ```bash
            cat arynox-os-${{ github.ref_name }}-amd64.img.part* > arynox-os.img
            # Write to USB
            sudo dd if=arynox-os.img of=/dev/sdX bs=4M status=progress
            ```

            **Option 2: Build with Docker**
            ```bash
            git clone https://github.com/aryaanchavan1-commits/Arynox_Ai_OS.git
            cd Arynox_Ai_OS
            docker build -t arynox-os .
            docker run --rm -it arynox-os
            ```

            **Option 3: Build natively**
            ```bash
            # Requires: Ubuntu 24.04, Rust, Flutter
            sudo bash build.sh
            ```

            ### Boot
            ```bash
            # QEMU headless
            qemu-system-x86_64 -m 4G -nographic \
              -drive file=arynox-os.img,format=raw,if=virtio

            # QEMU with GUI (VNC)
            qemu-system-x86_64 -m 4G -vga virtio -vnc :0 \
              -drive file=arynox-os.img,format=raw,if=virtio
            ```

            ### Credentials
            - User: `arynox` / Password: `arynox`
            - Root: passwordless sudo

            ### What's Included
            - systemd (PID 1), NetworkManager, SSH, pipewire
            - Weston Wayland compositor + Firefox
            - 15 Rust daemons + 11 Flutter desktop apps
            - AI runtime: Ollama + Qwen2.5 3B + Moondream2 + SmolVLM
            - AI auto-downloads on first boot (~8-10 GB)

            ### Build Details
            - Kernel: Ubuntu 7.0.0-14-generic
            - Base: Ubuntu 24.04 (resolute) via debootstrap
            - Size: ~6 GB uncompressed
          files: release/*
          draft: false
          prerelease: false
