name: Build and Release Arynox OS

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build OS Image
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debootstrap squashfs-tools xorriso \
            grub-pc mtools parted dosfstools \
            curl wget git python3-pip

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Flutter
        run: |
          wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.44.6-stable.tar.xz
          sudo tar xf flutter_linux_3.44.6-stable.tar.xz -C /opt
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          rm flutter_linux_3.44.6-stable.tar.xz

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build Rust daemons
        run: cargo build --release 2>&1 || echo "Rust build incomplete"

      - name: Build Flutter apps
        run: |
          for dir in src/*/ src/ai/*/; do
            if [ -f "$dir/pubspec.yaml" ]; then
              cd "$dir"
              flutter pub get
              flutter build linux --release || true
              cd -
            fi
          done

      - name: Build root filesystem
        run: sudo bash scripts/build-full-os.sh 2>&1

      - name: Build USB image
        run: sudo bash scripts/build-usb-image.sh 2>&1

      - name: Compress artifacts
        run: |
          mkdir -p release
          xz -T0 -9 < build/arynox-usb.img > release/arynox-os-${{ github.ref_name }}-amd64.img.xz
          xz -T0 -9 < build/filesystem.squashfs > release/arynox-os-${{ github.ref_name }}-filesystem.squashfs.xz
          cp build/vmlinuz-* release/ 2>/dev/null || true
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Arynox OS ${{ github.ref_name }}
          body: |
            ## Arynox OS ${{ github.ref_name }}

            ### Downloads
            - `arynox-os-${{ github.ref_name }}-amd64.img.xz` — Bootable USB/disk image (ext4 + GRUB)
            - `arynox-os-${{ github.ref_name }}-filesystem.squashfs.xz` — Compressed root filesystem

            ### Boot Instructions
            ```bash
            # Decompress
            xz -d arynox-os-${{ github.ref_name }}-amd64.img.xz

            # QEMU (headless)
            qemu-system-x86_64 -m 4G -nographic -drive file=arynox-os-${{ github.ref_name }}-amd64.img,format=raw,if=virtio

            # QEMU (with GUI via VNC)
            qemu-system-x86_64 -m 4G -vga virtio -vnc :0 -drive file=arynox-os-${{ github.ref_name }}-amd64.img,format=raw,if=virtio

            # Write to USB
            sudo dd if=arynox-os-${{ github.ref_name }}-amd64.img of=/dev/sdX bs=4M status=progress
            ```

            ### Credentials
            - Username: `arynox`
            - Password: `arynox`
            - Root/Sudo: passwordless sudo

            ### Features
            - systemd, NetworkManager, SSH, pipewire
            - Weston Wayland compositor + Firefox browser
            - 15 Rust daemons + 11 Flutter apps
            - AI runtime: Ollama + Qwen2.5 3B (auto-downloads on first boot)
          files: release/*
          draft: false
          prerelease: false
