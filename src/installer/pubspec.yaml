name: arynox_installer
description: Arynox OS Graphical Installer
version: 1.0.0

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1
  intl: ^0.19.0
  ubuntu_localizations: ^0.3.0
  xdg_directories: ^1.0.0
  path: ^1.8.3
  gsettings: ^0.2.0
  dio: ^5.4.0
  dbus: ^0.7.10
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
