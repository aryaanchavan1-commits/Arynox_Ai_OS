name: arynox_desktop
description: Arynox OS - Desktop Environment Shell
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Architecture
  provider: ^6.1.1
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Core
  intl: ^0.19.0
  collection: ^1.18.0
  uuid: ^4.3.3
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.1

  # IPC
  dbus: ^0.7.10

  # UI
  animations: ^2.0.11
  glass_kit: ^2.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.4.0
  lottie: ^3.1.0
  window_manager: ^0.3.8

  # AI
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  speech_to_text: ^6.5.1
  flutter_tts: ^3.8.5
  local_ai: ^0.1.0

  # System
  xdg_directories: ^1.0.4
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  file_picker: ^6.1.1
  url_launcher: ^6.2.4
  clipboard: ^0.1.3
  screen_retriever: ^0.1.9
  bitsdojo_window: ^0.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.5.1
  riverpod_generator: ^2.4.0
  mockito: ^5.4.4
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/wallpapers/
    - assets/fonts/
  fonts:
    - family: ArynoxSans
      fonts:
        - asset: assets/fonts/ArynoxSans-Regular.ttf
        - asset: assets/fonts/ArynoxSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/ArynoxSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/ArynoxSans-Bold.ttf
          weight: 700
    - family: ArynoxMono
      fonts:
        - asset: assets/fonts/ArynoxMono-Regular.ttf
        - asset: assets/fonts/ArynoxMono-Bold.ttf
          weight: 700
