name: Arynox OS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FLUTTER_VERSION: '3.22'

jobs:
  rust-checks:
    name: Rust - Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt
      - name: Build all crates
        run: cargo build --workspace --all-features
      - name: Run all tests
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Format check
        run: cargo fmt --all -- --check

  flutter-checks:
    name: Flutter - Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [desktop, settings, hub, assistant, copilot, files, devices, software, network, devtools, installer]
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Get dependencies
        run: flutter pub get
        working-directory: src/${{ matrix.project }}
      - name: Analyze
        run: flutter analyze
        working-directory: src/${{ matrix.project }}
      - name: Test
        run: flutter test
        working-directory: src/${{ matrix.project }}

  python-checks:
    name: Python - Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install poetry
          cd ai-python && poetry install
      - name: Lint with ruff
        run: cd ai-python && poetry run ruff check .
      - name: Format check with black
        run: cd ai-python && poetry run black --check .
      - name: Test with pytest
        run: cd ai-python && poetry run pytest

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-checks, flutter-checks, python-checks]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build all
        run: cargo build --workspace
      - name: Run integration tests
        run: cargo test --test '*'

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t arynoxos -f Dockerfile .

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [integration-tests, docker-build]
    if: always()
    steps:
      - name: Check status
        run: |
          if [ "${{ needs.integration-tests.result }}" = "success" ]; then
            echo "All checks passed"
          else
            echo "Some checks failed"
            exit 1
          fi
